version: "3.1"
nlu:
- intent: greet
  examples: |
    - hello
    - hi
    - namaste
    - good morning
    - hey there

- intent: goodbye
  examples: |
    - bye
    - goodbye
    - see you later
    - thanks bye

- intent: bot_challenge
  examples: |
    - are you a bot
    - are you human
    - who are you
    - what is your name

- intent: affirm
  examples: |
    - yes
    - haan
    - ha
    - sure
    - okay
    - yup

- intent: deny
  examples: |
    - no
    - nahi
    - na
    - stop

- intent: ask_health
  examples: |
    - I have [yellow spots](symptom) in [Pigeon Pea](crop)
    - What is the cure of [Fungal Disease](disease)?
    - How to treat [Bacterial Disease](disease)?
    - How long will recovery take?
    - How to prevent this disease?
    - what are symptoms and prevention for [mustard](crop)?
    - kitne din lagega recovery me?
    - iska ilaj kya hai?
    - [mango](crop) me [kale dabbe](symptom) ho gaye hai
    - symptoms of [late blight](disease)
    - prevention for [potato](crop) [late blight](disease)
    - which crops are affected?
    - how long it stays?
    - recovery time for this?
    - tell me everything about it
    - what medicine should I use?
    - ilaj batao
    - bachav kaise karein
