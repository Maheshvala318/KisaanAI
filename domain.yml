version: "3.1"

intents:
  - greet
  - goodbye
  - bot_challenge
  - ask_health
  - affirm
  - deny

entities:
  - crop
  - disease
  - symptom

slots:
  crop:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: crop

  disease:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: disease
      - type: custom

  detected_disease:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  image_metadata:
    type: any
    influence_conversation: false
    mappings:
      - type: custom

  last_disease:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  symptom:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: symptom

  user_language:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  last_answer:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  image_intro_sent:
    type: bool
    influence_conversation: false
    initial_value: false
    mappings:
      - type: custom

responses:
  utter_greet:
    - text: "Hello! I am KisaanAI. Tell me your crop and symptoms."

  utter_goodbye:
    - text: "Goodbye! Stay safe and take care of your crops."

  utter_iamabot:
    - text: "I am KisaanAI, your virtual farming assistant."

  utter_fallback:
    - text: "Sorry, I didn't understand that. Can you please rephrase?"

actions:
  - action_get_disease_info
  - action_get_disease_info_smart
